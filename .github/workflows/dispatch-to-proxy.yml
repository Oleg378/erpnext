name: Dispatch to Proxy Repo
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Set "pending" status on original PR
        if: github.repository == 'Oleg378/erpnext'  # Only on original repo
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.pull_request.head.sha }}',
              state: 'pending',
              target_url: 'https://github.com/Oleg378/erpnext-pipeline/actions/runs/${{ github.run_id }}',
              description: 'CI started via proxy repo',
              context: 'jenkins/ci'
            })

      - name: Dispatch to Proxy Repo
        run: |
          curl -X POST \
            "https://api.github.com/repos/Oleg378/erpnext-pipeline/dispatches" \
            -H "Authorization: token ${{ secrets.DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d '{
              "event_type": "validate-pr",
              "client_payload": {
                "branch": "${{ github.head_ref }}",
                "pr": "${{ github.event.pull_request.number }}",
                "repo": "${{ github.repository }}",
                "commit": "${{ github.event.pull_request.head.sha }}"
              }
            }'
        shell: bash
